---
- name: main.yml - Import pre-req tasks
  ansible.builtin.import_tasks: pre-req.yml
  tags:
    - pre-req

- name: main.yml - Import user tasks
  ansible.builtin.import_tasks: user.yml
  tags:
    - user

- name: main.yml - Import install tasks
  ansible.builtin.import_tasks: install.yml
  tags:
    - install

- name: main.yml - Import ssl tasks
  ansible.builtin.include_tasks:
    file: ssl.yml
    apply:
      tags:
        - ssl
        - certs
  when:
    - psistat_exporter_https | bool
  tags:
    - ssl
    - certs

- name: main.yml - Import config tasks
  ansible.builtin.import_tasks: config.yml
  tags:
    - config

- name: main.yml - Import clean tasks
  ansible.builtin.import_tasks: clean.yml
  tags:
    - never
    - clean
